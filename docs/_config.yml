title: IDLC Documentation
description: Infrastructure Development Lifecycle - Complete Documentation
baseurl: "/idlc/docs"
url: "https://idlc-framework.org"

theme: just-the-docs

color_scheme: light

search_enabled: true
search.heading_level: 3

heading_anchors: true

nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  "IDLC Home":
    - "https://idlc-framework.org"
  "GitHub":
    - "https://github.com/idlc-framework/idlc"

aux_links_new_tab: true

footer_content: "IDLC Framework Documentation. Distributed under the <a href=\"https://github.com/idlc-framework/idlc/blob/main/LICENSE\">MIT License</a>."

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  aws:
    title: AWS
    color: yellow
  azure:
    title: Azure
    color: blue
  gcp:
    title: GCP
    color: red

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
